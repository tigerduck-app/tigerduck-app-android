name: Release (Auto)

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d7336334ccaf61c96 # v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks

      - name: Build release AAB and APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PUSH_SHARED_SECRET: ${{ secrets.PUSH_SHARED_SECRET }}
        run: ./gradlew bundleRelease assembleRelease

      - name: Rename build outputs
        run: |
          VERSION=$(echo "${GITHUB_REF_NAME#v}" | tr '.' '_')
          mv app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/TigerDuck_v${VERSION}.apk"
          mv app/build/outputs/bundle/release/app-release.aab "app/build/outputs/bundle/release/TigerDuck_v${VERSION}.aab"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@935ef9c68bb393a8e6116b1575626a7f5be3a7fb # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: org.ntust.app.tigerduck
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: production
          status: inProgress
          userFraction: 0.1

      - name: Clean up keystore
        if: always()
        run: rm -f app/keystore.jks
