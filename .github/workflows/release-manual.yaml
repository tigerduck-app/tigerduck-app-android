name: Release (Manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). Created if it does not exist.'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve checkout ref
        id: resolve
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          set -e
          if git ls-remote --exit-code --tags "https://github.com/${{ github.repository }}.git" "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=$TAG" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists; will checkout the tag and attach artifacts."
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=main" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG not found; will tag 'main' and create the release."
          fi

      - name: Mint Releaser App token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.resolve.outputs.checkout_ref }}
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.app_token.outputs.token }}
          submodules: true

      - name: Capture build SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Import release GPG key
        if: steps.resolve.outputs.tag_exists == 'false'
        id: gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_tag_gpgsign: true

      - name: Preflight checks
        run: |
          set -euo pipefail
          fail=0

          # 1. App token reaches the repo.
          if ! gh api "repos/${REPO}" --jq .full_name >/dev/null; then
            echo "::error::App token cannot read ${REPO}. Check RELEASER_APP_ID/RELEASER_APP_PRIVATE_KEY and that the App is installed on this repo." >&2
            fail=1
          fi

          # 2. App token has contents:write (probe by listing branch protection-eligible refs).
          if ! gh api "repos/${REPO}/contents/metadata/org.ntust.app.tigerduck.fdroid.yml?ref=main" --jq .sha >/dev/null; then
            echo "::error::App token cannot read metadata file. App likely missing Contents:read on this repo." >&2
            fail=1
          fi

          # 3. Required artefact secrets present (don't print values; just check non-empty length).
          for s in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            v="${!s:-}"
            if [ -z "$v" ]; then
              echo "::error::Secret $s is empty or missing." >&2
              fail=1
            fi
          done

          # 4. If we're going to tag, verify GPG was imported and email looks GitHub-verifiable.
          if [ "${TAG_EXISTS}" = "false" ]; then
            if [ -z "${TAGGER_KEYID:-}" ]; then
              echo "::error::GPG key not imported (no keyid)." >&2
              fail=1
            fi
            if [ -z "${TAGGER_EMAIL:-}" ]; then
              echo "::error::GPG key has no email UID; GitHub cannot match it to an account." >&2
              fail=1
            fi
            # Sanity-test signing locally so we surface 'no secret key' / 'bad passphrase'
            # before spending 6 minutes building.
            if ! echo test | gpg --batch --yes --local-user "${TAGGER_EMAIL}" --clearsign >/dev/null 2>&1; then
              echo "::error::GPG cannot sign with key for ${TAGGER_EMAIL}. Check RELEASE_GPG_PRIVATE_KEY / RELEASE_GPG_PASSPHRASE." >&2
              fail=1
            fi
            echo "Tagger identity: ${TAGGER_EMAIL} (key ${TAGGER_KEYID})"
            echo "Reminder: this email must be a *verified* email on the GitHub user that owns the matching public key, otherwise the tag will land but show 'Unverified (bad_email)'."
          fi

          if [ "$fail" != "0" ]; then
            exit 1
          fi
          echo "Preflight OK."
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.inputs.tag }}
          TAG_EXISTS: ${{ steps.resolve.outputs.tag_exists }}
          TAGGER_EMAIL: ${{ steps.gpg.outputs.email }}
          TAGGER_KEYID: ${{ steps.gpg.outputs.keyid }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks

      - name: Build release AAB and APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PUSH_SHARED_SECRET: ${{ secrets.PUSH_SHARED_SECRET }}
        run: ./gradlew bundleRelease assembleRelease

      - name: Rename build outputs
        run: |
          mv app/build/outputs/apk/play/release/app-play-release.apk "app/build/outputs/apk/play/release/TigerDuck.apk"
          mv app/build/outputs/apk/fdroid/release/app-fdroid-release.apk "app/build/outputs/apk/fdroid/release/TigerDuck-fdroid.apk"
          mv app/build/outputs/bundle/playRelease/app-play-release.aab "app/build/outputs/bundle/playRelease/TigerDuck.aab"
          mv app/build/outputs/bundle/fdroidRelease/app-fdroid-release.aab "app/build/outputs/bundle/fdroidRelease/TigerDuck-fdroid.aab"

      - name: Create and push signed tag
        if: steps.resolve.outputs.tag_exists == 'false'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          TAG: ${{ github.event.inputs.tag }}
          SHA: ${{ steps.sha.outputs.sha }}
          REPO: ${{ github.repository }}
          TAGGER_NAME: ${{ steps.gpg.outputs.name }}
          TAGGER_EMAIL: ${{ steps.gpg.outputs.email }}
        run: |
          set -euo pipefail
          git config user.name "${TAGGER_NAME}"
          git config user.email "${TAGGER_EMAIL}"
          git tag -s "${TAG}" "${SHA}" -m "${TAG}"
          # Tag refs are outside the ruleset's include list, so this push
          # uses the App token already configured in checkout's credentials.
          git push origin "refs/tags/${TAG}"
          # Verify GitHub recognised the signature.
          state=$(gh api "repos/${REPO}/git/refs/tags/${TAG}" --jq '.object.sha' \
            | xargs -I{} gh api "repos/${REPO}/git/tags/{}" --jq .verification.verified)
          if [ "$state" != "true" ]; then
            tag_obj=$(gh api "repos/${REPO}/git/refs/tags/${TAG}" --jq '.object.sha')
            echo "Tag ${TAG} pushed but NOT verified (state=$state)" >&2
            gh api "repos/${REPO}/git/tags/${tag_obj}" --jq .verification >&2
            exit 1
          fi
          echo "Tag ${TAG} created and verified."

      - name: Update F-Droid metadata commit hash
        if: steps.resolve.outputs.tag_exists == 'false'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          SHA: ${{ steps.sha.outputs.sha }}
          REPO: ${{ github.repository }}
          BRANCH: main
          TAG: ${{ github.event.inputs.tag }}
          FILE_PATH: metadata/org.ntust.app.tigerduck.fdroid.yml
        run: |
          set -euo pipefail
          # Use the Contents API so GitHub signs the resulting commit with
          # the web-flow key (verified) and the App token's bypass entry on
          # the ruleset lets the push through. Retries on SHA conflict in
          # case another commit landed on ${BRANCH} during the build.
          for attempt in 1 2 3; do
            current=$(gh api "repos/${REPO}/contents/${FILE_PATH}?ref=${BRANCH}")
            file_sha=$(printf '%s' "$current" | jq -r .sha)
            content=$(printf '%s' "$current" | jq -r .content | base64 -d)
            new_content=$(printf '%s' "$content" | sed -E "s|^([[:space:]]*commit:).*|\1 ${SHA}|")
            if [ "$content" = "$new_content" ]; then
              echo "No change to ${FILE_PATH}; skipping."
              exit 0
            fi
            new_b64=$(printf '%s' "$new_content" | base64 | tr -d '\n')
            if gh api -X PUT "repos/${REPO}/contents/${FILE_PATH}" \
              -f message="chore(fdroid): pin metadata commit to ${SHA} for ${TAG}" \
              -f content="${new_b64}" \
              -f sha="${file_sha}" \
              -f branch="${BRANCH}"; then
              echo "F-Droid metadata commit pushed."
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              echo "Failed to update ${FILE_PATH} after 3 attempts" >&2
              exit 1
            fi
            echo "Update rejected (likely SHA conflict); retrying (attempt $attempt)"
            sleep 2
          done

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: |
            app/build/outputs/apk/play/release/*.apk
            app/build/outputs/apk/fdroid/release/*.apk
            app/build/outputs/bundle/playRelease/*.aab
            app/build/outputs/bundle/fdroidRelease/*.aab

      - name: Clean up keystore
        if: always()
        run: rm -f app/keystore.jks
