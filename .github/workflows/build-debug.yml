name: Build Debug

on:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d7336334ccaf61c96 # v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
          echo "Keystore size: $(wc -c < app/keystore.jks) bytes"

      - name: Verify signing config
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "Keystore exists: $(test -f app/keystore.jks && echo yes || echo no)"
          echo "KEYSTORE_PASSWORD set: $(test -n "$KEYSTORE_PASSWORD" && echo yes || echo no)"
          echo "KEY_ALIAS set: $(test -n "$KEY_ALIAS" && echo yes || echo no)"
          echo "KEY_PASSWORD set: $(test -n "$KEY_PASSWORD" && echo yes || echo no)"

      - name: Build release AAB and APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease assembleRelease

      - name: List build outputs
        run: |
          echo "=== All APK/AAB files ==="
          find . -type f \( -name "*.apk" -o -name "*.aab" \) 2>/dev/null || echo "None found"
          echo "=== app/build/outputs tree ==="
          ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs dir"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: build-outputs
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/bundle/**/*.aab

      - name: Clean up keystore
        if: always()
        run: rm -f app/keystore.jks
